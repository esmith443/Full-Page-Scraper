<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 260px;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: #14161a;
    color: #e8e8ea;
    padding: 16px;
    margin: 0;
    text-align: center;
  }
  h1 { font-size: 14px; margin: 0 0 12px 0; color: #fff; }
  p { font-size: 11px; color: #9a9ea6; margin: 0 0 14px 0; }
  button {
    width: 100%;
    background: #2b6cff;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px;
    font-size: 13px;
    cursor: pointer;
  }
  button:hover { opacity: 0.9; }
</style>
</head>
<body>
  <h1>Full Page Scraper</h1>
  <p>Opens a save tab where you pick a folder. Everything possible to pull - HTML, CSS, JS, images - gets written into it.</p>
  <button id="openBtn">Scrape &amp; Save This Page</button>
  <script src="popup.js"></script>
</body>
</html>
